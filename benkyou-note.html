<style>
:root{
  --bg:#f4f1ea;           /* クリーム地 */
  --surface:#ffffff;      /* カード */
  --surface2:#ffffff;     /* シート/ダイアログ */
  --edge:#e4e0d6;         /* 罫線 */
  --line:#e4e0d6;
  --amber:#e8590c;        /* 工事オレンジ（アクセント） */
  --amber-dark:#c44a06;
  --amber-dim:rgba(232,89,12,.10);
  --text:#1f2421;
  --text-soft:#6b6f6a;
  --danger:#c92a2a;
  --radius:16px;
  --shadow:0 1px 2px rgba(31,36,33,.06),0 6px 18px rgba(31,36,33,.07);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI","Yu Gothic","Noto Sans JP",Meiryo,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
}
.mono{font-family:ui-monospace,"SF Mono","Roboto Mono","Noto Sans Mono",monospace;font-variant-numeric:tabular-nums}

/* ── ヘッダー ── */
header{
  position:sticky;top:0;z-index:50;
  background:linear-gradient(180deg,var(--bg) 72%,rgba(244,241,234,0));
  color:var(--text);
  padding:calc(env(safe-area-inset-top) + 16px) 16px 6px;
}
.head-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding-bottom:4px}
h1{
  font-size:1.4rem;letter-spacing:.01em;font-weight:800;color:var(--text);
  display:inline-flex;align-items:center;gap:9px;
}
h1::before{content:'';width:9px;height:9px;border-radius:50%;background:var(--amber)}
h1 small{display:block;font-size:.56rem;letter-spacing:.18em;margin-top:2px;font-weight:700;color:var(--amber);width:100%}
.head-btns{display:flex;gap:8px}
.hbtn{
  background:var(--surface);border:1.5px solid var(--edge);color:var(--text);
  width:40px;height:40px;border-radius:12px;font-size:1.05rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);
}
.hbtn:active{background:var(--bg)}

/* 検索バー */
#searchWrap{display:none;margin-top:8px;padding-bottom:6px}
#searchWrap.open{display:block}
#searchInput{
  width:100%;padding:12px 14px;border-radius:13px;border:1.5px solid var(--edge);
  font-size:1rem;background:var(--surface);color:var(--text);
}
#searchInput::placeholder{color:var(--text-soft)}
#searchInput:focus{outline:none;border-color:var(--amber)}

/* ── カテゴリータブ ── */
#genreBar{
  position:sticky;top:0;z-index:40;
  display:flex;gap:8px;overflow-x:auto;padding:12px 16px 12px;
  background:rgba(244,241,234,.92);
  backdrop-filter:blur(6px);
  scrollbar-width:none;
}
#genreBar::-webkit-scrollbar{display:none}
.chip{
  flex:0 0 auto;padding:9px 16px;border-radius:999px;font-size:.9rem;
  border:1.5px solid var(--edge);background:var(--surface);color:var(--text-soft);
  cursor:pointer;display:flex;align-items:center;gap:7px;font-weight:700;
}
.chip .dot{width:9px;height:9px;border-radius:50%}
.chip.active{background:var(--text);border-color:var(--text);color:#fff}
.chip.active .dot{box-shadow:0 0 0 2px rgba(255,255,255,.3)}
.chip.add{border-style:dashed;color:var(--text-soft)}

/* ── クイック入力 ── */
main{max-width:560px;margin:0 auto;padding:6px 16px calc(env(safe-area-inset-bottom) + 96px)}
#quick{
  background:var(--surface);border:1px solid var(--edge);border-radius:var(--radius);
  padding:14px;box-shadow:var(--shadow);
}
#quickText{
  width:100%;border:none;resize:none;font:inherit;font-size:1.02rem;line-height:1.7;
  min-height:1.7em;max-height:40vh;background:transparent;color:var(--text);
}
#quickText::placeholder{color:var(--text-soft)}
#quickText:focus{outline:none}
#quickBar{display:none;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--edge)}
#quick.expanded #quickBar{display:flex}
#quickGenre{
  font:inherit;font-size:.9rem;border:1.5px solid var(--edge);border-radius:10px;
  padding:8px 10px;background:var(--bg);color:var(--text);max-width:46%;
}
#quickSave{
  background:var(--amber);color:#fff;border:none;border-radius:12px;
  padding:11px 24px;font-size:.98rem;font-weight:800;cursor:pointer;
}
#quickSave:active{background:var(--amber-dark)}

/* ── ノート一覧 ── */
#stats{font-size:.76rem;color:var(--text-soft);margin:16px 4px 10px;letter-spacing:.02em;font-weight:600}
.note{
  background:var(--surface);border:1px solid var(--edge);border-radius:var(--radius);
  padding:15px 15px 13px;margin-bottom:13px;cursor:pointer;position:relative;
  box-shadow:var(--shadow);
  border-left:5px solid var(--line);
  animation:pop .25s ease both;
}
@keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.note.pinned{background:linear-gradient(180deg,var(--amber-dim),var(--surface) 44%)}
.note-text{font-size:1rem;line-height:1.7;white-space:pre-wrap;word-break:break-word;overflow:hidden;display:-webkit-box;-webkit-line-clamp:6;-webkit-box-orient:vertical;color:var(--text)}
.note-text a{color:var(--amber);word-break:break-all}
.note-meta{display:flex;align-items:center;gap:10px;margin-top:11px;font-size:.76rem;color:var(--text-soft)}
.note-genre{display:flex;align-items:center;gap:5px;font-weight:700}
.note-genre .dot{width:8px;height:8px;border-radius:50%}
.pin-mark{position:absolute;top:11px;right:13px;font-size:.85rem;color:var(--amber)}
#empty{
  text-align:center;color:var(--text-soft);padding:56px 20px;font-size:.92rem;line-height:2;font-weight:600;
}
#empty .big{font-size:2.4rem;display:block;margin-bottom:8px;opacity:.6}

/* ── 編集シート ── */
#overlay{
  position:fixed;inset:0;background:rgba(31,36,33,.45);z-index:90;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
#overlay.open{opacity:1;pointer-events:auto}
#sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:100;
  background:var(--surface2);border-radius:24px 24px 0 0;
  transform:translateY(105%);transition:transform .26s cubic-bezier(.32,.72,0,1);
  max-height:92vh;display:flex;flex-direction:column;
  box-shadow:0 -6px 30px rgba(31,36,33,.2);
}
#sheet.open{transform:translateY(0)}
.sheet-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 18px 8px;
}
.grab{width:42px;height:5px;border-radius:999px;background:var(--edge);margin:8px auto 0}
.sheet-head .status{font-size:.76rem;color:var(--text-soft);font-weight:600}
.sheet-close{
  background:var(--amber);color:#fff;border:none;border-radius:12px;
  padding:9px 20px;font-size:.92rem;font-weight:800;cursor:pointer;
}
.sheet-close:active{background:var(--amber-dark)}
#sheetText{
  flex:1;margin:4px 18px;padding:4px 2px;border:none;background:transparent;
  font:inherit;font-size:1.02rem;line-height:1.7;resize:none;color:var(--text);
  min-height:34vh;
}
#sheetText::placeholder{color:var(--text-soft)}
#sheetText:focus{outline:none}
.sheet-tools{
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;
  padding:12px 18px calc(env(safe-area-inset-bottom) + 16px);
  border-top:1px solid var(--edge);background:var(--bg);
}
#sheetGenre{
  font:inherit;font-size:.9rem;border:1.5px solid var(--edge);border-radius:10px;
  padding:9px 10px;background:var(--surface);color:var(--text);flex:1;min-width:120px;
}
.tbtn{
  border:1.5px solid var(--edge);background:var(--surface);border-radius:10px;
  padding:9px 13px;font-size:.88rem;cursor:pointer;color:var(--text);white-space:nowrap;font-weight:600;
}
.tbtn.on{background:var(--amber-dim);border-color:var(--amber);color:var(--amber)}
.tbtn.del{color:var(--danger);border-color:#f0c9c4}

/* ── メニューシート ── */
#menuSheet{
  position:fixed;left:0;right:0;bottom:0;z-index:100;background:var(--surface2);
  border-radius:24px 24px 0 0;transform:translateY(105%);transition:transform .26s cubic-bezier(.32,.72,0,1);
  padding:8px 18px calc(env(safe-area-inset-bottom) + 20px);
  box-shadow:0 -6px 30px rgba(31,36,33,.2);
}
#menuSheet.open{transform:translateY(0)}
.menu-item{
  display:flex;align-items:center;gap:12px;width:100%;padding:16px 6px;
  background:none;border:none;border-bottom:1px solid var(--edge);
  font:inherit;font-size:.98rem;color:var(--text);cursor:pointer;text-align:left;font-weight:700;
}
.menu-item:last-child{border-bottom:none}
.menu-item .ic{width:26px;text-align:center}
.menu-item small{display:block;font-size:.74rem;color:var(--text-soft);margin-top:2px;font-weight:500}

/* ── トースト ── */
#toast{
  position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 24px);
  transform:translate(-50%,80px);z-index:200;transition:transform .25s;
  background:var(--text);color:#fff;border-radius:999px;padding:12px 20px;
  font-size:.88rem;font-weight:600;display:flex;align-items:center;gap:14px;white-space:nowrap;
  box-shadow:0 6px 20px rgba(31,36,33,.3);
}
#toast.show{transform:translate(-50%,0)}
#toast button{background:none;border:none;color:#ffb27a;font:inherit;font-weight:800;cursor:pointer}

/* ── FAB ── */
#fab{
  position:fixed;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom) + 22px);z-index:60;
  border:none;cursor:pointer;
  background:var(--amber);color:#fff;font-size:1.02rem;font-weight:800;
  padding:15px 28px;border-radius:999px;
  box-shadow:0 8px 24px rgba(232,89,12,.4);
  display:flex;align-items:center;gap:8px;
}
#fab::before{content:'＋';font-size:1.3rem;line-height:1}
#fab:active{transform:translateX(-50%) scale(.96);background:var(--amber-dark)}

/* カテゴリー追加ダイアログ */
#genreDialog,#cloudDialog{
  position:fixed;inset:0;z-index:150;display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.6);padding:20px;
}
#genreDialog.open,#cloudDialog.open{display:flex}
#cloudDialog .gd-box{max-width:420px;max-height:88vh;overflow:auto}
.cl-field{display:block;margin:12px 0 4px;font-size:.82rem;color:var(--text-soft)}
.cl-input{width:100%;padding:11px 12px;border:1.5px solid var(--edge);border-radius:9px;font:inherit;font-size:.95rem;background:var(--surface);color:var(--text);word-break:break-all}
.cl-input::placeholder{color:var(--text-soft)}
.cl-status{margin:12px 0;font-size:.85rem;color:var(--text-soft);min-height:1.2em}
.cl-note{font-size:.78rem;color:var(--text-soft);line-height:1.55;margin-top:10px}
.cl-sql{margin-top:8px;font-size:.72rem;background:var(--surface);border:1px solid var(--edge);border-radius:8px;padding:10px;white-space:pre-wrap;word-break:break-all;color:var(--text-soft);max-height:150px;overflow:auto}
.gd-box{background:var(--surface2);border:1px solid var(--edge);border-radius:14px;padding:20px;width:100%;max-width:340px}
.gd-box h3{font-size:1rem;margin-bottom:14px;color:var(--text)}
#genreName{width:100%;padding:11px 12px;border:1.5px solid var(--edge);border-radius:9px;font:inherit;font-size:1rem;background:var(--surface);color:var(--text)}
#genreName::placeholder{color:var(--text-soft)}
.gd-colors{display:flex;gap:10px;margin:14px 0;flex-wrap:wrap}
.gd-color{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent}
.gd-color.sel{border-color:var(--text)}
.gd-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:6px}
.gd-btns button{padding:9px 18px;border-radius:9px;font:inherit;font-size:.9rem;cursor:pointer;border:1px solid var(--edge);background:var(--surface);color:var(--text)}
.gd-btns .pri{background:var(--amber);color:#fff;border:none;font-weight:700}

/* ── 画像 ── */
.note-imgs{display:flex;gap:6px;margin-top:9px}
.note-imgs img{width:64px;height:64px;object-fit:cover;border-radius:8px;border:1px solid var(--edge);background:var(--surface2)}
.note-imgs .more{width:64px;height:64px;border-radius:8px;background:var(--bg);border:1px solid var(--edge);display:flex;align-items:center;justify-content:center;font-size:.8rem;color:var(--text-soft)}
#quickPreview{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
#quickPreview:empty{display:none}
.pv{position:relative}
.pv img{width:64px;height:64px;object-fit:cover;border-radius:8px;border:1px solid var(--edge)}
.pv .rm{position:absolute;top:-8px;right:-8px;width:22px;height:22px;border-radius:50%;border:none;background:var(--amber);color:#fff;font-size:.75rem;cursor:pointer;line-height:1;font-weight:700}
.attach{border:1px solid var(--edge);background:var(--surface2);color:var(--text);border-radius:8px;padding:7px 11px;font-size:1rem;cursor:pointer;flex:0 0 auto}
#sheetImgs{display:flex;gap:8px;flex-wrap:wrap;padding:0 16px 10px}
#sheetImgs:empty{display:none}
#sheetImgs img{width:76px;height:76px;object-fit:cover;border-radius:8px;border:1px solid var(--edge);cursor:pointer;background:var(--surface2)}
#lightbox{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.95);display:none;flex-direction:column}
#lightbox.open{display:flex}
#lightbox img{flex:1;object-fit:contain;max-width:100%;min-height:0;margin:14px}
.lb-bar{display:flex;justify-content:center;gap:12px;padding:10px 16px calc(env(safe-area-inset-bottom) + 16px)}
.lb-bar button{padding:10px 26px;border-radius:9px;border:none;font:inherit;font-size:.9rem;cursor:pointer;background:var(--surface2);color:var(--text);font-weight:600;border:1px solid var(--edge)}
.lb-bar .del{background:var(--danger);color:#fff;border:none}

@media(min-width:700px){
  main{padding-top:20px}
  #sheet,#menuSheet{max-width:640px;margin:0 auto}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<header>
  <div class="head-row">
    <h1>勉強野帳<small class="mono">STUDY FIELD NOTE</small></h1>
    <div class="head-btns">
      <button class="hbtn" id="btnSearch" aria-label="検索">🔍</button>
      <button class="hbtn" id="btnMenu" aria-label="メニュー">≡</button>
    </div>
  </div>
  <div id="searchWrap">
    <input id="searchInput" type="search" placeholder="ノートを検索…" autocomplete="off">
  </div>
</header>

<div id="genreBar"></div>

<main>
  <div id="quick">
    <textarea id="quickText" placeholder="メモを書く…" rows="1"></textarea>
    <div id="quickBar">
      <div style="display:flex;gap:8px;align-items:center;flex:1;min-width:0">
        <button class="attach" id="quickAttach" aria-label="画像を添付">📷</button>
        <select id="quickGenre"></select>
      </div>
      <button id="quickSave">記帳する</button>
    </div>
    <div id="quickPreview"></div>
  </div>
  <div id="stats" class="mono"></div>
  <div id="list"></div>
  <div id="empty" style="display:none">
    <span class="big">✎</span>
    まだノートがありません。<br>上の欄に書いて「記帳する」を押すだけ。
  </div>
</main>

<button id="fab" aria-label="新しいメモ">メモを追加</button>

<div id="overlay"></div>

<!-- 編集シート -->
<div id="sheet" role="dialog" aria-label="ノート編集">
  <div class="grab"></div>
  <div class="sheet-head">
    <span class="status" id="sheetStatus"></span>
    <button class="sheet-close" id="sheetClose">閉じる</button>
  </div>
  <textarea id="sheetText" placeholder="メモを書く…"></textarea>
  <div id="sheetImgs"></div>
  <div class="sheet-tools">
    <button class="attach" id="sheetAttach" aria-label="画像を追加">📷</button>
    <select id="sheetGenre"></select>
    <button class="tbtn" id="btnPin">📌 ピン留め</button>
    <button class="tbtn" id="btnArchive">📦 保管</button>
    <button class="tbtn del" id="btnDelete">削除</button>
  </div>
</div>

<!-- メニューシート -->
<div id="menuSheet" role="dialog" aria-label="メニュー">
  <div class="grab"></div>
  <button class="menu-item" id="miArchive"><span class="ic">📦</span><span>保管庫を見る<small>アーカイブしたノート</small></span></button>
  <button class="menu-item" id="miExport"><span class="ic">💾</span><span>バックアップを保存<small>全ノートをファイルに書き出し</small></span></button>
  <button class="menu-item" id="miImport"><span class="ic">📥</span><span>バックアップを読み込み<small>ファイルから復元・統合</small></span></button>
  <button class="menu-item" id="miGenre"><span class="ic">🏷</span><span>カテゴリーを追加<small>好きな名前で分類できます</small></span></button>
  <button class="menu-item" id="miCloud"><span class="ic">☁️</span><span>端末間で共有する<small>スマホとPCで同じメモに</small></span></button>
</div>
<input type="file" id="importFile" accept=".json" style="display:none">

<!-- ジャンル追加 -->
<div id="genreDialog">
  <div class="gd-box">
    <h3>新しいカテゴリー</h3>
    <input id="genreName" placeholder="例:施工管理、経済、健康…" maxlength="20">
    <div class="gd-colors" id="gdColors"></div>
    <div class="gd-btns">
      <button id="gdCancel">やめる</button>
      <button class="pri" id="gdOk">追加</button>
    </div>
  </div>
</div>

<!-- クラウド共有設定 -->
<div id="cloudDialog">
  <div class="gd-box">
    <h3>☁️ 端末間で共有する</h3>
    <p class="cl-note">スマホとPCで同じメモを見るには、下の2つを入力して「保存して同期」を押してください。（各端末で最初の1回だけ）</p>

      <summary style="cursor:pointer;color:var(--text-soft);font-size:.8rem">はじめて使うとき（表を作るSQL）</summary>
      <p class="cl-note">Supabaseの「SQL Editor」に下記を貼り付けて実行すると、共有用の表ができます（1回だけ）。</p>

<input type="file" id="imgFile" accept="image/*" multiple style="display:none">

<!-- 画像ビューア -->
<div id="lightbox" role="dialog" aria-label="画像">
  <img id="lbImg" alt="">
  <div class="lb-bar">
    <button class="del" id="lbDelete" style="display:none">この画像を削除</button>
    <button id="lbClose">閉じる</button>
  </div>
</div>

<div id="toast"><span id="toastMsg"></span><button id="toastAct" style="display:none"></button></div>

<script>
'use strict';
/* ───────── ストレージ(localStorage / メモリ両対応) ───────── */
const KEY='benkyou_yacho_v1';
let memStore=null, storageOK=true;
function loadData(){
  try{ const raw=localStorage.getItem(KEY); if(raw) return JSON.parse(raw); }
  catch(e){ storageOK=false; }
  return memStore || null;
}
function saveData(){
  const payload=JSON.stringify(state);
  memStore=state;
  try{ localStorage.setItem(KEY,payload); }
  catch(e){ storageOK=false; }
  scheduleCloudPush();
}

/* ───────── 画像ストレージ(IndexedDB) ───────── */
let idb=null;
const idbReady=new Promise(res=>{
  try{
    const req=indexedDB.open('benkyou_yacho',1);
    req.onupgradeneeded=()=>{ req.result.createObjectStore('images',{keyPath:'id'}); };
    req.onsuccess=()=>{ idb=req.result; res(true); };
    req.onerror=()=>res(false);
  }catch(e){ res(false); }
});
const imgCache=new Map();
async function putImage(id,data){
  imgCache.set(id,data);
  await idbReady; if(!idb) return;
  try{ idb.transaction('images','readwrite').objectStore('images').put({id,data}); }catch(e){}
}
function idbGet(id){
  return new Promise(async res=>{
    await idbReady; if(!idb) return res(null);
    try{
      const rq=idb.transaction('images').objectStore('images').get(id);
      rq.onsuccess=()=>{ const d=rq.result?rq.result.data:null; if(d) imgCache.set(id,d); res(d); };
      rq.onerror=()=>res(null);
    }catch(e){ res(null); }
  });
}
async function getImage(id){
  if(imgCache.has(id)) return imgCache.get(id);
  let d=await idbGet(id);
  if(d==null && cloudOn()){
    // 他の端末で追加された画像をクラウドから取得
    try{
      const rows=await sbGet('benkyou_images','id=eq.'+encodeURIComponent(id)+'&select=data');
      if(rows[0]&&rows[0].data){ d=rows[0].data; await putImage(id,d); pushedImages.add(id); }
    }catch(e){}
  }
  return d;
}
async function delImage(id){
  imgCache.delete(id);
  await idbReady; if(!idb) return;
  try{ idb.transaction('images','readwrite').objectStore('images').delete(id); }catch(e){}
}
/* 長辺1400pxに縮小してJPEG化(容量節約) */
function compressImage(file){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=1400;
      let w=img.width,h=img.height;
      if(Math.max(w,h)>MAX){ const r=MAX/Math.max(w,h); w=Math.round(w*r); h=Math.round(h*r); }
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(img.src);
      res(c.toDataURL('image/jpeg',0.8));
    };
    img.onerror=()=>{ URL.revokeObjectURL(img.src); rej(new Error('load')); };
    img.src=URL.createObjectURL(file);
  });
}
async function filesToImages(fileList){
  const ids=[];
  for(const f of fileList){
    if(!f.type||!f.type.startsWith('image/')) continue;
    try{
      const data=await compressImage(f);
      const id='img_'+uid();
      await putImage(id,data);
      ids.push(id);
    }catch(e){}
  }
  return ids;
}
/* 一覧・シートのサムネイルに画像を流し込む */
function loadThumbs(root){
  (root||document).querySelectorAll('img[data-imgid]:not([data-loaded])').forEach(async el=>{
    el.dataset.loaded='1';
    const d=await getImage(el.dataset.imgid);
    if(d) el.src=d;
  });
}

/* ───────── 初期データ ───────── */
const GENRE_COLORS=['#5FBE8D','#E2735C','#5B9BD1','#E3A23C','#B98CE0','#8FCB6B','#D083A6','#9AA4AF'];
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
let state=loadData()||{
  genres:[
    {id:'g1',name:'資格勉強',color:'#5FBE8D'},
    {id:'g2',name:'経済・金融',color:'#5B9BD1'},
    {id:'g3',name:'健康',color:'#E2735C'},
    {id:'g4',name:'アイデア',color:'#E3A23C'},
  ],
  notes:[]
};

/* ───────── 画面状態 ───────── */
let currentGenre='all';       // 'all' | genreId
let viewArchive=false;
let searchQ='';
let editingId=null;
let toastTimer=null, pendingDelete=null;

/* ───────── ユーティリティ ───────── */
const $=id=>document.getElementById(id);
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function linkify(escaped){
  return escaped.replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener" onclick="event.stopPropagation()">$1</a>');
}
function fmtDate(t){
  const d=new Date(t), now=new Date();
  const same=d.toDateString()===now.toDateString();
  const hm=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  if(same) return '今日 '+hm;
  const yd=new Date(now); yd.setDate(now.getDate()-1);
  if(d.toDateString()===yd.toDateString()) return '昨日 '+hm;
  const y=d.getFullYear()===now.getFullYear()?'':d.getFullYear()+'/';
  return y+(d.getMonth()+1)+'/'+d.getDate()+' '+hm;
}
function genreOf(id){ return state.genres.find(g=>g.id===id); }

/* ───────── 描画 ───────── */
function renderGenres(){
  const bar=$('genreBar');
  let html=`<button class="chip ${currentGenre==='all'&&!viewArchive?'active':''}" data-g="all">すべて</button>`;
  for(const g of state.genres){
    const act=currentGenre===g.id&&!viewArchive;
    html+=`<button class="chip ${act?'active':''}" data-g="${g.id}">
      <span class="dot" style="background:${act?'#fff':g.color}"></span>${esc(g.name)}</button>`;
  }
  html+=`<button class="chip ${viewArchive?'active':''}" data-g="__archive">📦 保管庫</button>`;
  html+=`<button class="chip add" data-g="__add">＋ カテゴリー</button>`;
  bar.innerHTML=html;
  // セレクトボックス
  const opts=state.genres.map(g=>`<option value="${g.id}">${esc(g.name)}</option>`).join('');
  $('quickGenre').innerHTML=opts;
  $('sheetGenre').innerHTML=opts;
  if(currentGenre!=='all'&&genreOf(currentGenre)) $('quickGenre').value=currentGenre;
}
function filteredNotes(){
  let arr=state.notes.filter(n=>!!n.archived===viewArchive);
  if(!viewArchive&&currentGenre!=='all') arr=arr.filter(n=>n.genre===currentGenre);
  if(searchQ){
    const q=searchQ.toLowerCase();
    arr=arr.filter(n=>n.text.toLowerCase().includes(q));
  }
  arr.sort((a,b)=>(b.pinned-a.pinned)||(b.updated-a.updated));
  return arr;
}
function renderList(){
  const arr=filteredNotes();
  const list=$('list');
  $('empty').style.display=arr.length?'none':'block';
  $('empty').innerHTML=viewArchive
    ? '<span class="big">📦</span>保管庫は空です。'
    : searchQ
      ? '<span class="big">🔍</span>「'+esc(searchQ)+'」は見つかりませんでした。'
      : '<span class="big">✎</span>まだノートがありません。<br>上の欄に書いて「記帳する」を押すだけ。';
  const total=state.notes.filter(n=>!n.archived).length;
  const today=state.notes.filter(n=>!n.archived&&new Date(n.created).toDateString()===new Date().toDateString()).length;
  $('stats').textContent=viewArchive
    ? `保管庫 ${arr.length}件`
    : `${arr.length}件を表示 ／ 全${total}件 ／ 今日の記帳 ${today}件`;
  list.innerHTML=arr.map(n=>{
    const g=genreOf(n.genre);
    return `<div class="note ${n.pinned?'pinned':''}" data-id="${n.id}" style="border-left-color:${g?g.color:'var(--line)'}">
      ${n.pinned?'<span class="pin-mark">📌</span>':''}
      ${n.text?`<div class="note-text">${linkify(esc(n.text))}</div>`:''}
      ${(n.images&&n.images.length)?`<div class="note-imgs">${
        n.images.slice(0,3).map(id=>`<img data-imgid="${id}" alt="">`).join('')
      }${n.images.length>3?`<div class="more">+${n.images.length-3}</div>`:''}</div>`:''}
      <div class="note-meta">
        ${g?`<span class="note-genre" style="color:${g.color}"><span class="dot" style="background:${g.color}"></span>${esc(g.name)}</span>`:''}
        <span class="mono">${fmtDate(n.updated)}</span>
      </div>
    </div>`;
  }).join('');
  loadThumbs(list);
}
function renderAll(){ renderGenres(); renderList(); }

/* ───────── クイック入力 ───────── */
const quickText=$('quickText');
function autoGrow(el){ el.style.height='auto'; el.style.height=el.scrollHeight+'px'; }
quickText.addEventListener('focus',()=>{ $('quick').classList.add('expanded'); autoGrow(quickText); });
quickText.addEventListener('input',()=>autoGrow(quickText));
quickText.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){ e.preventDefault(); saveQuick(); }
});
let quickImages=[];
function renderQuickPreview(){
  $('quickPreview').innerHTML=quickImages.map(id=>
    `<div class="pv"><img data-imgid="${id}" alt=""><button class="rm" data-rm="${id}" aria-label="外す">✕</button></div>`).join('');
  loadThumbs($('quickPreview'));
}
$('quickPreview').addEventListener('click',e=>{
  const b=e.target.closest('.rm'); if(!b) return;
  const id=b.dataset.rm;
  quickImages=quickImages.filter(x=>x!==id);
  delImage(id);
  renderQuickPreview();
});
function saveQuick(){
  const text=quickText.value.trim();
  if(!text&&!quickImages.length) return;
  const genre=$('quickGenre').value||state.genres[0]?.id;
  const now=Date.now();
  state.notes.unshift({id:uid(),text,genre,images:quickImages,pinned:false,archived:false,created:now,updated:now});
  saveData();
  quickText.value=''; autoGrow(quickText);
  quickImages=[]; renderQuickPreview();
  $('quick').classList.remove('expanded'); quickText.blur();
  toast('記帳しました');
  renderList();
}
$('quickSave').addEventListener('click',saveQuick);
document.addEventListener('click',e=>{
  if(!$('quick').contains(e.target)&&!quickText.value.trim()&&!quickImages.length){
    $('quick').classList.remove('expanded');
  }
});

/* ───────── 画像添付 ───────── */
let imgTarget='quick';
$('quickAttach').addEventListener('click',()=>{ imgTarget='quick'; $('imgFile').click(); });
$('sheetAttach').addEventListener('click',()=>{ imgTarget='sheet'; $('imgFile').click(); });
$('imgFile').addEventListener('change',async e=>{
  const files=e.target.files;
  if(!files.length) return;
  toast('画像を取り込み中…');
  const ids=await filesToImages(files);
  e.target.value='';
  if(!ids.length){ toast('画像を読み込めませんでした'); return; }
  if(imgTarget==='quick'){
    quickImages=quickImages.concat(ids);
    $('quick').classList.add('expanded');
    renderQuickPreview();
  }else{
    const n=state.notes.find(x=>x.id===editingId); if(!n) return;
    n.images=(n.images||[]).concat(ids); n.updated=Date.now(); saveData();
    renderSheetImgs(n);
  }
  toast(ids.length+'枚を添付しました');
});

/* ───────── ジャンル切替 ───────── */
$('genreBar').addEventListener('click',e=>{
  const btn=e.target.closest('.chip'); if(!btn) return;
  const g=btn.dataset.g;
  if(g==='__add'){ openGenreDialog(); return; }
  if(g==='__archive'){ viewArchive=true; currentGenre='all'; }
  else{ viewArchive=false; currentGenre=g; }
  renderAll();
});

/* ───────── 検索 ───────── */
$('btnSearch').addEventListener('click',()=>{
  const w=$('searchWrap'); w.classList.toggle('open');
  if(w.classList.contains('open')) $('searchInput').focus();
  else{ $('searchInput').value=''; searchQ=''; renderList(); }
});
$('searchInput').addEventListener('input',e=>{ searchQ=e.target.value.trim(); renderList(); });

/* ───────── 編集シート ───────── */
const sheet=$('sheet'), overlay=$('overlay');
let saveTimer=null;
function renderSheetImgs(n){
  $('sheetImgs').innerHTML=(n.images||[]).map(id=>`<img data-imgid="${id}" data-lb="${id}" alt="">`).join('');
  loadThumbs($('sheetImgs'));
}
$('sheetImgs').addEventListener('click',e=>{
  const img=e.target.closest('img[data-lb]'); if(!img) return;
  openLightbox(img.dataset.lb,true);
});
let lbImgId=null;
async function openLightbox(id,canDelete){
  lbImgId=id;
  const d=await getImage(id); if(!d) return;
  $('lbImg').src=d;
  $('lbDelete').style.display=canDelete?'inline-block':'none';
  $('lightbox').classList.add('open');
}
$('lbClose').addEventListener('click',()=>$('lightbox').classList.remove('open'));
$('lightbox').addEventListener('click',e=>{ if(e.target.id==='lightbox'||e.target.id==='lbImg') $('lightbox').classList.remove('open'); });
$('lbDelete').addEventListener('click',()=>{
  const n=state.notes.find(x=>x.id===editingId);
  if(n&&lbImgId){
    n.images=(n.images||[]).filter(x=>x!==lbImgId);
    n.updated=Date.now(); saveData();
    delImage(lbImgId);
    renderSheetImgs(n);
    toast('画像を削除しました');
  }
  $('lightbox').classList.remove('open');
});
function openSheet(id){
  const n=state.notes.find(x=>x.id===id); if(!n) return;
  editingId=id;
  $('sheetText').value=n.text;
  renderSheetImgs(n);
  $('sheetGenre').value=n.genre;
  $('btnPin').classList.toggle('on',!!n.pinned);
  $('btnArchive').textContent=n.archived?'↩ 戻す':'📦 保管';
  $('sheetStatus').textContent=fmtDate(n.created)+' 作成';
  overlay.classList.add('open'); sheet.classList.add('open');
}
function closeSheet(){
  flushEdit();
  overlay.classList.remove('open'); sheet.classList.remove('open');
  editingId=null; renderList();
}
function flushEdit(){
  if(!editingId) return;
  const n=state.notes.find(x=>x.id===editingId); if(!n) return;
  const t=$('sheetText').value;
  const g=$('sheetGenre').value;
  if(t!==n.text||g!==n.genre){ n.text=t; n.genre=g; n.updated=Date.now(); saveData(); }
}
$('sheetText').addEventListener('input',()=>{
  clearTimeout(saveTimer);
  $('sheetStatus').textContent='書き込み中…';
  saveTimer=setTimeout(()=>{ flushEdit(); $('sheetStatus').textContent='保存済み ✓'; },600);
});
$('sheetGenre').addEventListener('change',()=>{ flushEdit(); $('sheetStatus').textContent='保存済み ✓'; });
$('sheetClose').addEventListener('click',closeSheet);
overlay.addEventListener('click',closeSheet);
$('list').addEventListener('click',e=>{
  const card=e.target.closest('.note'); if(!card) return;
  openSheet(card.dataset.id);
});
$('btnPin').addEventListener('click',()=>{
  const n=state.notes.find(x=>x.id===editingId); if(!n) return;
  n.pinned=!n.pinned; n.updated=Date.now(); saveData();
  $('btnPin').classList.toggle('on',n.pinned);
  toast(n.pinned?'ピン留めしました':'ピンを外しました');
});
$('btnArchive').addEventListener('click',()=>{
  const n=state.notes.find(x=>x.id===editingId); if(!n) return;
  flushEdit();
  n.archived=!n.archived; n.pinned=false; n.updated=Date.now(); saveData();
  closeSheet();
  toast(n.archived?'保管庫に移しました':'保管庫から戻しました');
});
$('btnDelete').addEventListener('click',()=>{
  const idx=state.notes.findIndex(x=>x.id===editingId); if(idx<0) return;
  pendingDelete={note:state.notes[idx],idx};
  state.notes.splice(idx,1); saveData();
  closeSheet();
  toast('削除しました','元に戻す',()=>{
    if(pendingDelete){ state.notes.splice(pendingDelete.idx,0,pendingDelete.note); pendingDelete=null; saveData(); renderList(); }
  });
});

/* ───────── FAB ───────── */
$('fab').addEventListener('click',()=>{
  if(viewArchive){ viewArchive=false; renderAll(); }
  window.scrollTo({top:0,behavior:'smooth'});
  quickText.focus();
});

/* ───────── メニュー ───────── */
const menuSheet=$('menuSheet');
$('btnMenu').addEventListener('click',()=>{ overlay.classList.add('open'); menuSheet.classList.add('open'); });
function closeMenu(){ overlay.classList.remove('open'); menuSheet.classList.remove('open'); }
overlay.addEventListener('click',closeMenu);
$('miArchive').addEventListener('click',()=>{ viewArchive=true; currentGenre='all'; closeMenu(); renderAll(); });
$('miGenre').addEventListener('click',()=>{ closeMenu(); openGenreDialog(); });
$('miExport').addEventListener('click',async ()=>{
  toast('バックアップを作成中…');
  const images={};
  for(const n of state.notes){
    for(const id of (n.images||[])){
      const d=await getImage(id); if(d) images[id]=d;
    }
  }
  const blob=new Blob([JSON.stringify({...state,images})],{type:'application/json'});
  const a=document.createElement('a');
  const d=new Date(), pad=n=>String(n).padStart(2,'0');
  a.download=`勉強野帳_${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}.json`;
  a.href=URL.createObjectURL(blob); a.click();
  URL.revokeObjectURL(a.href);
  closeMenu(); toast('バックアップを保存しました');
});
$('miImport').addEventListener('click',()=>{ $('importFile').click(); });
$('importFile').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=async ()=>{
    try{
      const data=JSON.parse(r.result);
      if(!Array.isArray(data.notes)||!Array.isArray(data.genres)) throw 0;
      // 画像を復元
      if(data.images){
        for(const [id,d] of Object.entries(data.images)) await putImage(id,d);
      }
      // 統合(IDが重複しないものだけ追加)
      const noteIds=new Set(state.notes.map(n=>n.id));
      const genreIds=new Set(state.genres.map(g=>g.id));
      let added=0;
      for(const g of data.genres) if(!genreIds.has(g.id)) state.genres.push(g);
      for(const n of data.notes) if(!noteIds.has(n.id)){ state.notes.push(n); added++; }
      saveData(); closeMenu(); renderAll();
      toast(added+'件のノートを読み込みました');
    }catch(_){ toast('ファイルを読み込めませんでした'); }
    e.target.value='';
  };
  r.readAsText(f);
});

/* ───────── ジャンル追加 ───────── */
let gdColor=GENRE_COLORS[0];
function openGenreDialog(){
  $('genreName').value='';
  gdColor=GENRE_COLORS[state.genres.length%GENRE_COLORS.length];
  $('gdColors').innerHTML=GENRE_COLORS.map(c=>
    `<div class="gd-color ${c===gdColor?'sel':''}" style="background:${c}" data-c="${c}"></div>`).join('');
  $('genreDialog').classList.add('open');
  setTimeout(()=>$('genreName').focus(),100);
}
$('gdColors').addEventListener('click',e=>{
  const el=e.target.closest('.gd-color'); if(!el) return;
  gdColor=el.dataset.c;
  document.querySelectorAll('.gd-color').forEach(x=>x.classList.toggle('sel',x.dataset.c===gdColor));
});
$('gdCancel').addEventListener('click',()=>$('genreDialog').classList.remove('open'));
$('genreDialog').addEventListener('click',e=>{ if(e.target.id==='genreDialog') $('genreDialog').classList.remove('open'); });
$('gdOk').addEventListener('click',()=>{
  const name=$('genreName').value.trim();
  if(!name) return;
  const g={id:uid(),name,color:gdColor,updated:Date.now()};
  state.genres.push(g); saveData();
  $('genreDialog').classList.remove('open');
  currentGenre=g.id; viewArchive=false;
  renderAll(); toast('「'+name+'」を追加しました');
});
$('genreName').addEventListener('keydown',e=>{ if(e.key==='Enter') $('gdOk').click(); });

/* ───────── トースト ───────── */
function toast(msg,actLabel,actFn){
  const t=$('toast');
  $('toastMsg').textContent=msg;
  const b=$('toastAct');
  if(actLabel){ b.style.display='inline'; b.textContent=actLabel; b.onclick=()=>{ actFn(); hideToast(); }; }
  else b.style.display='none';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(hideToast,actLabel?5000:2000);
}
function hideToast(){
  $('toast').classList.remove('show');
  if(pendingDelete){ (pendingDelete.note.images||[]).forEach(delImage); }
  pendingDelete=null;
}

/* ───────── クラウド共有(Supabase) ───────── */
const CL_URL_KEY='benkyou_sb_url', CL_KEY_KEY='benkyou_sb_key';
let cloud={ url:localStorage.getItem(CL_URL_KEY)||'', key:localStorage.getItem(CL_KEY_KEY)||'' };
let cloudPushTimer=null, cloudBusy=false;
// クラウドで既知の状態(id→updated)。差分だけ送るために使う
let syncedNotes=new Map(), syncedGenres=new Map();
let pushedImages=new Set();   // クラウドに送信済みの画像ID

function cloudOn(){ return !!(cloud.url && cloud.key); }
function persistLocal(){ memStore=state; try{ localStorage.setItem(KEY,JSON.stringify(state)); }catch(e){ storageOK=false; } }
function sbHeaders(extra){
  return Object.assign({'apikey':cloud.key,'Authorization':'Bearer '+cloud.key,'Content-Type':'application/json'},extra||{});
}
function sbUrl(path){ return cloud.url.replace(/\/+$/,'')+'/rest/v1/'+path; }
async function sbGet(table,query){
  const r=await fetch(sbUrl(table+'?'+query),{headers:sbHeaders()});
  if(!r.ok) throw new Error('get '+table+' '+r.status);
  return r.json();
}
async function sbUpsert(table,rows){
  if(!rows.length) return;
  const r=await fetch(sbUrl(table),{method:'POST',headers:sbHeaders({'Prefer':'resolution=merge-duplicates,return=minimal'}),body:JSON.stringify(rows)});
  if(!r.ok) throw new Error('upsert '+table+' '+r.status+' '+(await r.text()));
}

function scheduleCloudPush(){
  if(!cloudOn()) return;
  clearTimeout(cloudPushTimer);
  cloudPushTimer=setTimeout(cloudPush,1200);
}
async function cloudPush(){
  if(!cloudOn()||cloudBusy) return;
  cloudBusy=true;
  try{
    // --- ジャンル ---
    const gRows=[];
    for(const g of state.genres){
      if(syncedGenres.get(g.id)!==(g.updated||0))
        gRows.push({id:g.id,name:g.name,color:g.color,deleted:false,updated:g.updated||0});
    }
    for(const [id] of syncedGenres) if(!state.genres.find(g=>g.id===id))
      gRows.push({id,name:'',color:'',deleted:true,updated:Date.now()});
    // --- ノート＋新規画像 ---
    const nRows=[], imgRows=[];
    for(const n of state.notes){
      if(syncedNotes.get(n.id)!==(n.updated||0)){
        nRows.push({id:n.id,text:n.text||'',genre:n.genre||'',images:n.images||[],pinned:!!n.pinned,archived:!!n.archived,deleted:false,created:n.created||0,updated:n.updated||0});
        for(const iid of (n.images||[])){
          if(!pushedImages.has(iid)){ const d=await getImage(iid); if(d) imgRows.push({id:iid,data:d}); }
        }
      }
    }
    for(const [id] of syncedNotes) if(!state.notes.find(n=>n.id===id))
      nRows.push({id,text:'',genre:'',images:[],pinned:false,archived:false,deleted:true,created:0,updated:Date.now()});
    // 画像→ジャンル→ノートの順に送る
    if(imgRows.length){ await sbUpsert('benkyou_images',imgRows); imgRows.forEach(r=>pushedImages.add(r.id)); }
    if(gRows.length) await sbUpsert('benkyou_genres',gRows);
    if(nRows.length) await sbUpsert('benkyou_notes',nRows);
    syncedGenres=new Map(state.genres.map(g=>[g.id,g.updated||0]));
    syncedNotes=new Map(state.notes.map(n=>[n.id,n.updated||0]));
  }catch(e){ /* 次回リトライ */ }
  cloudBusy=false;
}
async function cloudPull(){
  if(!cloudOn()) return false;
  let changed=false;
  try{
    const [gRows,nRows]=await Promise.all([
      sbGet('benkyou_genres','select=*'),
      sbGet('benkyou_notes','select=*')
    ]);
    for(const r of gRows){
      const local=state.genres.find(g=>g.id===r.id), lu=local?(local.updated||0):-1;
      if(r.deleted){ if(local){ state.genres=state.genres.filter(g=>g.id!==r.id); changed=true; } }
      else if(!local){ state.genres.push({id:r.id,name:r.name,color:r.color,updated:r.updated}); changed=true; }
      else if(r.updated>lu){ local.name=r.name; local.color=r.color; local.updated=r.updated; changed=true; }
    }
    for(const r of nRows){
      const idx=state.notes.findIndex(n=>n.id===r.id), local=idx>=0?state.notes[idx]:null, lu=local?(local.updated||0):-1;
      if(r.deleted){ if(local){ state.notes.splice(idx,1); changed=true; } }
      else if(!local){
        state.notes.push({id:r.id,text:r.text,genre:r.genre,images:r.images||[],pinned:r.pinned,archived:r.archived,created:r.created,updated:r.updated});
        (r.images||[]).forEach(iid=>pushedImages.add(iid)); changed=true;
      }else if(r.updated>lu){
        Object.assign(local,{text:r.text,genre:r.genre,images:r.images||[],pinned:r.pinned,archived:r.archived,created:r.created,updated:r.updated});
        (r.images||[]).forEach(iid=>pushedImages.add(iid)); changed=true;
      }
    }
    for(const r of gRows){ if(r.deleted) syncedGenres.delete(r.id); else syncedGenres.set(r.id,r.updated); }
    for(const r of nRows){ if(r.deleted) syncedNotes.delete(r.id); else syncedNotes.set(r.id,r.updated); }
    if(changed){ persistLocal(); renderAll(); }
  }catch(e){ return false; }
  return changed;
}
async function cloudSyncNow(silent){
  if(!cloudOn()) return;
  await cloudPull();     // まずクラウドの最新を取り込む
  await cloudPush();     // ローカルの未送信分を送る
  if(!silent) clStatusMsg('同期しました ✓');
}

/* ── クラウド設定ダイアログ ── */
const SQL_TEXT=
`create table if not exists benkyou_genres (
  id text primary key, name text, color text,
  deleted boolean default false, updated bigint default 0);
create table if not exists benkyou_notes (
  id text primary key, text text, genre text, images jsonb,
  pinned boolean default false, archived boolean default false,
  deleted boolean default false, created bigint default 0, updated bigint default 0);
create table if not exists benkyou_images (
  id text primary key, data text);
alter table benkyou_genres enable row level security;
alter table benkyou_notes  enable row level security;
alter table benkyou_images enable row level security;
create policy anon_all on benkyou_genres for all using (true) with check (true);
create policy anon_all on benkyou_notes  for all using (true) with check (true);
create policy anon_all on benkyou_images for all using (true) with check (true);`;
function clStatusMsg(m){ $('clStatus').textContent=m; }
function openCloudDialog(){
  $('clUrl').value=cloud.url; $('clKey').value=cloud.key;
  $('clSql').textContent=SQL_TEXT;
  clStatusMsg(cloudOn()?'共有オン（設定済み）':'まだ設定されていません');
  $('cloudDialog').classList.add('open');
}
$('miCloud').addEventListener('click',()=>{ closeMenu(); openCloudDialog(); });
$('clClose').addEventListener('click',()=>$('cloudDialog').classList.remove('open'));
$('cloudDialog').addEventListener('click',e=>{ if(e.target.id==='cloudDialog') $('cloudDialog').classList.remove('open'); });
$('clSave').addEventListener('click',async ()=>{
  const url=$('clUrl').value.trim(), key=$('clKey').value.trim();
  if(!url||!key){ clStatusMsg('URLとキーの両方を入力してください'); return; }
  cloud.url=url; cloud.key=key;
  localStorage.setItem(CL_URL_KEY,url); localStorage.setItem(CL_KEY_KEY,key);
  clStatusMsg('同期中…');
  await cloudSyncNow(true);
  clStatusMsg('保存して同期しました ✓ 他の端末でも同じ設定を入れてください');
});
$('clSync').addEventListener('click',async ()=>{
  if(!cloudOn()){ clStatusMsg('先に保存してください'); return; }
  clStatusMsg('同期中…'); await cloudSyncNow(true); clStatusMsg('同期しました ✓');
});

/* ── 定期・復帰時に自動同期 ── */
setInterval(()=>{ if(cloudOn()&&!document.hidden) cloudPull(); },15000);
document.addEventListener('visibilitychange',()=>{ if(!document.hidden&&cloudOn()) cloudSyncNow(true); });

/* ───────── 起動 ───────── */
renderAll();
if(cloudOn()){
  cloudSyncNow(true).then(()=>{ toast('クラウドと同期しました'); });
}else if(!storageOK){
  setTimeout(()=>toast('※この環境では保存が一時的です。実機ブラウザで開くと自動保存されます'),800);
}
</script>
